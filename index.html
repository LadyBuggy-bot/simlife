<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>СимЛайф</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 20'><polygon points='8,0 16,10 8,20 0,10' fill='%232ECC71'/></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
body{font-family:'Segoe UI','Noto Sans',system-ui,sans-serif;overflow-x:hidden;background:#0f0c29;touch-action:pan-y}
button,input{touch-action:manipulation}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}
button{font-family:inherit;transition:all .15s;user-select:none;-webkit-user-select:none;cursor:pointer;border:none}
button:active{transform:scale(.96)!important}
input{font-family:inherit}

@keyframes plumbob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-18px) rotate(3deg)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(46,204,113,.3)}50%{box-shadow:0 0 40px rgba(46,204,113,.6)}}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.7}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translate(-50%,-16px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes petBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes heartUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-30px) scale(.4)}}
@keyframes snow{0%{transform:translateY(-10px)}100%{transform:translateY(100vh)}}
@keyframes leaf{0%{transform:translateY(-10px) rotate(0)}100%{transform:translateY(100vh) rotate(720deg)}}

.screen{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
.glass{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.notif{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999;background:rgba(0,0,0,.88);color:#fff;padding:9px 22px;border-radius:50px;font-size:13px;font-weight:600;animation:slideDown .3s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;box-shadow:0 6px 24px rgba(0,0,0,.3)}
.hidden{display:none!important}

/* Title */
#title{align-items:center;justify-content:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;position:relative;overflow:hidden}
#stars{position:absolute;inset:0;pointer-events:none}
#eggArea{pointer-events:none}
#eggArea *{pointer-events:auto}
.star{position:absolute;border-radius:50%;background:#fff;pointer-events:none}
.plumbob-big{animation:float 3s ease infinite;pointer-events:none}
.title-text{font-size:clamp(36px,10vw,56px);font-weight:900;letter-spacing:-2px;background:linear-gradient(90deg,#2ECC71,#3498DB,#9B59B6,#E74C3C,#2ECC71);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;pointer-events:none}
.btn-play{padding:16px 50px;font-size:17px;font-weight:800;background:linear-gradient(135deg,#2ECC71,#27AE60);border-radius:50px;color:#fff;letter-spacing:1px;box-shadow:0 0 30px rgba(46,204,113,.4);text-transform:uppercase}
.btn-continue{padding:12px 36px;font-size:14px;font-weight:700;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:50px;color:#fff}

/* Create */
#create{align-items:center;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;padding:16px;overflow-y:auto}
.create-wrap{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;max-width:700px;width:100%}
.preview-box{background:rgba(255,255,255,.06);border-radius:18px;padding:20px;display:flex;flex-direction:column;align-items:center;border:1px solid rgba(255,255,255,.08);min-width:160}
.name-input{margin-top:12px;padding:9px 14px;border-radius:25px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;font-size:14px;text-align:center;width:155px;outline:none}
.opts{flex:1;min-width:260px;display:flex;flex-direction:column;gap:12px}
.sec-label{font-size:10px;font-weight:700;opacity:.5;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.swatches{display:flex;gap:7px;flex-wrap:wrap}
.sw{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .2s}
.sw.active{border-color:#2ECC71;box-shadow:0 0 10px rgba(46,204,113,.5)}
.sw-sq{border-radius:6px}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(255,255,255,.1);color:#fff}
.chip.active{background:#2ECC71}
.trait-btn{padding:7px 11px;border-radius:10px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);text-align:left}
.trait-btn.active{background:#2ECC71;color:#fff}
.step-dot{padding:5px 13px;border-radius:18px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;cursor:pointer;background:rgba(255,255,255,.1);color:rgba(255,255,255,.5)}
.step-dot.active{background:#2ECC71;color:#fff}
.btn-nav{padding:11px 30px;font-size:13px;font-weight:700;border-radius:50px;color:#fff}
.btn-start{padding:13px 42px;font-size:15px;font-weight:800;background:linear-gradient(135deg,#2ECC71,#27AE60);border-radius:50px;color:#fff;box-shadow:0 0 30px rgba(46,204,113,.4);text-transform:uppercase}

/* Game */
#game{padding:7px;transition:background 2s}
.topbar{display:flex;align-items:center;justify-content:space-between;border-radius:12px;padding:6px 10px;margin-bottom:5px;flex-wrap:wrap;gap:4px;box-shadow:0 2px 14px rgba(0,0,0,.07)}
.topbar .name{font-weight:800;font-size:14px;color:#333}
.topbar .mood-tag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.topbar .info{display:flex;align-items:center;gap:9px;font-size:11px;font-weight:600;color:#555;flex-wrap:wrap}
.speed-btn{width:24px;height:24px;border-radius:50%;font-size:9px;font-weight:800}
.tags{display:flex;gap:3px;margin-bottom:4px;flex-wrap:wrap}
.tag{font-size:9px;padding:2px 7px;border-radius:7px;font-weight:600}
.main-layout{display:flex;gap:7px}
.room-wrap{flex:1 1 400px;display:flex;flex-direction:column;gap:6px}
.room{position:relative;width:100%;height:320px;border-radius:12px;overflow:hidden;box-shadow:0 3px 20px rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.3)}
.room-cell{position:absolute;transition:background 2s}
.room-cell .floor{position:absolute;bottom:0;width:100%;height:40%;transition:background 2s}
.room-cell .label{position:absolute;top:2px;left:5px;font-size:7px;color:rgba(0,0,0,.2);font-weight:700;letter-spacing:1px;text-transform:uppercase}
.furn-item{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;background:rgba(255,255,255,.45);border:1.5px solid rgba(255,255,255,.5);transition:all .2s;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.05)}
.furn-item:active{transform:scale(1.06)}
.sim{position:absolute;z-index:10;transition:left .8s ease,top .8s ease;filter:drop-shadow(2px 3px 6px rgba(0,0,0,.2))}
.bubble{position:absolute;background:#fff;border-radius:12px;padding:4px 10px;box-shadow:0 3px 10px rgba(0,0,0,.1);font-size:10px;font-weight:600;color:#333;animation:fadeIn .3s;white-space:nowrap;z-index:20;transition:left .8s,top .8s}
.bubble::after{content:'';position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid #fff}
.night-overlay{position:absolute;inset:0;background:rgba(10,10,40,.25);pointer-events:none;transition:all 2s}
.progress-bar{border-radius:9px;padding:6px 10px;display:flex;align-items:center;gap:7px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.quick-actions{display:flex;gap:3px;flex-wrap:wrap}
.quick-btn{padding:4px 8px;border-radius:11px;background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.06);font-size:9px;font-weight:600;display:flex;align-items:center;gap:2px;color:#555}
.side-panel{width:225px;display:flex;flex-direction:column;gap:5px}
.tab-row{display:flex;gap:2px;flex-wrap:wrap}
.tab-btn{padding:5px 8px;border-radius:8px 8px 0 0;font-size:10px;font-weight:700;display:flex;align-items:center;gap:2px;background:rgba(255,255,255,.4);color:#888;border-bottom:2px solid transparent}
.tab-btn.active{background:rgba(255,255,255,.95);color:#333;border-bottom-color:#2ECC71}
.tab-content{border-radius:0 10px 10px 10px;padding:9px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.action-row{display:flex;gap:3px}
.action-btn{flex:1;padding:7px 0;border-radius:9px;color:#fff;font-size:10px;font-weight:700}
.log-box{border-radius:10px;padding:8px;box-shadow:0 2px 10px rgba(0,0,0,.05);flex:1;max-height:120px;overflow-y:auto}
.save-btn{padding:7px 0;border-radius:8px;background:rgba(255,255,255,.7);color:#666;font-size:10px;font-weight:700}

/* Overlay */
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s;padding:10px}
.overlay-box{background:#fff;border-radius:18px;padding:18px;max-width:520px;width:100%;max-height:82vh;overflow-y:auto;box-shadow:0 16px 50px rgba(0,0,0,.3)}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.shop-card{padding:10px;border-radius:10px;border:2px solid #eee}
.shop-card.owned{border-color:#2ECC71;background:#f0fff4}
.npc-row{display:flex;align-items:center;gap:10px;padding:9px;border-radius:10px;border:2px solid #eee;cursor:pointer;transition:border-color .2s;margin-bottom:6px}
.npc-row:active{border-color:#E91E63}
.social-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.social-btn{padding:8px;border-radius:8px;text-align:left;color:#fff}
.social-btn:disabled{background:#eee!important;color:#ccc!important}
.career-row{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;border:2px solid #eee;margin-bottom:6px}
.career-row.active{border-color:#2ECC71;background:#f0fff4}
.close-btn{margin-top:12px;width:100%;padding:10px 0;border-radius:10px;background:#eee;color:#666;font-size:13px;font-weight:700}

.need-row{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.need-row .icon{font-size:14px;width:20px;text-align:center}
.need-row .lbl{font-size:10px;width:55px;color:#777;font-weight:600}
.need-row .bar{flex:1;height:10px;background:rgba(0,0,0,.1);border-radius:5px;overflow:hidden}
.need-row .fill{height:100%;border-radius:5px;transition:width .5s}
.need-row .val{font-size:9px;width:24px;text-align:right}

.skill-row{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.skill-row .bar{flex:1;height:8px;background:rgba(0,0,0,.1);border-radius:4px;overflow:hidden}
.skill-row .fill{height:100%;background:linear-gradient(90deg,#3498DB,#2980B9);border-radius:4px;transition:width .3s}

.secret-heart{position:absolute;right:5px;bottom:5px;font-size:7px;cursor:pointer;opacity:.12;z-index:5;user-select:none;transition:all .3s}
.secret-heart:hover{opacity:1!important;font-size:14px!important}

.egg-msg{animation:fadeIn .5s}
.egg-text{font-size:14px;font-weight:700;background:linear-gradient(90deg,#ff6eb4,#E74C3C,#ff6eb4);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite;text-align:center}
.hearts-row span{animation:heartUp 2s ease infinite}

@media(max-width:640px){
  .main-layout{flex-direction:column}
  .side-panel{width:100%}
  .room{height:280px}
}


/* Touch-action for all interactive elements */
button,.furn-item,.tab-btn,.action-btn,.quick-btn,.sw,.chip,.trait-btn,.step-dot,.npc-row,.career-row{touch-action:manipulation;cursor:pointer;user-select:none;-webkit-user-select:none}
.room-cell,.sim,.bubble,.night-overlay,.secret-heart{pointer-events:none!important}
.overlay-bg{pointer-events:auto}.overlay-box{pointer-events:auto}


</style>
</head>
<body>

<div id="title" class="screen">
  <div id="stars"></div>
  <div class="plumbob-big" style="margin-bottom:18px">
    <svg width="90" height="112" viewBox="0 0 80 100"><defs><linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#2ECC71"/><stop offset="100%" stop-color="#27AE60"/></linearGradient></defs><polygon points="40,0 80,50 40,100 0,50" fill="url(#pg)"/><polygon points="40,0 80,50 40,50" fill="rgba(255,255,255,.15)"/></svg>
  </div>
  <div class="title-text">СимЛайф</div>
  <p style="font-size:13px;opacity:.4;margin-top:6px;letter-spacing:4px;text-transform:uppercase;color:#fff">симулятор жизни</p>
  <p style="font-size:11px;opacity:.25;margin-top:4px;margin-bottom:28px;color:#fff">Создавай · Живи · Мечтай · Люби</p>
  <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
    <button id="btnPlay" class="btn-play" onclick="startCreate()">▶ Новая игра</button>
    <button id="btnContinue" class="btn-continue hidden" onclick="loadAndStart()">📂 Продолжить</button>
  </div>
  <div id="eggArea" style="position:absolute;bottom:10px;display:flex;flex-direction:column;align-items:center">
    <p id="eggTrigger" style="font-size:10px;opacity:.2;color:#fff;user-select:none;cursor:default" onclick="eggTap()">Сделано с ❤️ специально для тебя</p>
  </div>
</div>

<div id="create" class="screen hidden"></div>
<div id="game" class="screen hidden"></div>
<div id="notifEl" class="notif hidden"></div>
<div id="overlayEl" class="overlay-bg hidden" onclick="closeOverlay()"><div class="overlay-box" onclick="event.stopPropagation()" id="overlayContent"></div></div>

<script>
/* ═══════════════════ DATA ═══════════════════ */
const NEEDS=["hunger","energy","fun","hygiene","social","bladder"];
const NL={hunger:"Голод",energy:"Энергия",fun:"Веселье",hygiene:"Гигиена",social:"Общение",bladder:"Туалет"};
const NI={hunger:"🍕",energy:"⚡",fun:"🎮",hygiene:"🚿",social:"💬",bladder:"🚽"};
const NC={hunger:"#ff6b6b",energy:"#ffd93d",fun:"#6bcb77",hygiene:"#4d96ff",social:"#ff6eb4",bladder:"#a66cff"};
const MOODS=[{min:0,l:"Ужасно",e:"😫",c:"#ff4444"},{min:20,l:"Плохо",e:"😟",c:"#ff8844"},{min:40,l:"Так себе",e:"😐",c:"#ffcc44"},{min:60,l:"Хорошо",e:"😊",c:"#88cc44"},{min:80,l:"Отлично",e:"😄",c:"#44cc44"},{min:92,l:"Великолепно",e:"🤩",c:"#00cc88"}];
const SKINS=["#FDDBB4","#F5CBA7","#E8B98A","#D4956B","#A0674B","#6B4226"];
const HCOLORS=["#2C1810","#8B4513","#DAA520","#C0392B","#FF69B4","#4169E1","#ECF0F1","#2F4F4F"];
const HSTYLES=["short","long","curly","ponytail","bun","buzz"];
const HLB={short:"Короткие",long:"Длинные",curly:"Кудри",ponytail:"Хвост",bun:"Пучок",buzz:"Ёжик"};
const SHIRTS=["#E74C3C","#3498DB","#2ECC71","#9B59B6","#F39C12","#1ABC9C","#E91E63","#34495E"];
const PANTSC=["#2C3E50","#34495E","#7F8C8D","#2980B9","#8E44AD","#1ABC9C"];
const EYESC=["#4A2810","#2E86C1","#27AE60","#7D3C98","#2C3E50"];
const TRAITS=[{id:"creative",n:"Творческий",i:"🎨",d:"Быстрее учит творчество"},{id:"active",n:"Активный",i:"🏃",d:"Энергия падает медленнее"},{id:"foodie",n:"Гурман",i:"🍳",d:"Больше радости от еды"},{id:"social",n:"Душа компании",i:"🎉",d:"Общение растёт быстрее"},{id:"loner",n:"Одиночка",i:"🌙",d:"Общение падает медленнее"},{id:"neat",n:"Чистюля",i:"✨",d:"Гигиена падает медленнее"},{id:"lucky",n:"Везунчик",i:"🍀",d:"Больше бонусов"},{id:"romantic",n:"Романтик",i:"💕",d:"Отношения растут быстрее"}];
const SKILLS=[{id:"cooking",n:"Кулинария",i:"🍳"},{id:"fitness",n:"Фитнес",i:"💪"},{id:"creativity",n:"Творчество",i:"🎨"},{id:"logic",n:"Логика",i:"🧠"},{id:"charisma",n:"Харизма",i:"💬"}];

    <div><div class="sec-label">Верх</div><div class="swatches">${SHIRTS.map(s=>`<div class="sw sw-sq ${c.shirtColor===s?'active':''}" style="background:${s}" onclick="G.char.shirtColor='${s}';renderCreate()"></div>`).join('')}</div></div>
    <div><div class="sec-label">Низ</div><div class="swatches">${PANTSC.map(s=>`<div class="sw sw-sq ${c.pantsColor===s?'active':''}" style="background:${s}" onclick="G.char.pantsColor='${s}';renderCreate()"></div>`).join('')}</div></div>`;
  else opts=`<div><div class="sec-label">Черты характера (до 3)</div><div style="display:flex;gap:5px;flex-wrap:wrap">${TRAITS.map(t=>`<button class="trait-btn ${c.traits.includes(t.id)?'active':''}" onclick="toggleTrait('${t.id}')"><span style="font-size:15px">${t.i}</span><div><div>${t.n}</div><div style="font-size:8px;opacity:.7">${t.d}</div></div></button>`).join('')}</div></div>`;

  $('create').innerHTML=`
    <h2 style="font-size:22px;font-weight:800;margin-bottom:4px">✨ Создай персонажа</h2>
    <div style="display:flex;gap:6px;margin-bottom:16px">${steps.map((s,i)=>`<div class="step-dot ${cStep===i?'active':''}" onclick="cStep=${i};renderCreate()"><span>${s.i}</span>${s.t}</div>`).join('')}</div>
    <div class="create-wrap">
      <div class="preview-box">
        ${charSVG(c,110)}
        <input class="name-input" value="${c.name}" placeholder="Имя..." oninput="G.char.name=this.value">
        ${c.traits.length?`<div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;justify-content:center">${c.traits.map(tid=>{const tr=TRAITS.find(x=>x.id===tid);return`<span style="font-size:9px;background:rgba(46,204,113,.2);padding:2px 8px;border-radius:10px;color:#2ECC71">${tr.i} ${tr.n}</span>`}).join('')}</div>`:''}

      ${cStep<2?`<button class="btn-nav" style="background:linear-gradient(135deg,#3498DB,#2980B9)" onclick="cStep++;renderCreate()">Далее →</button>`
      :`<button class="btn-start" onclick="beginGame()">Начать жизнь →</button>`}
    </div>`;
}
function toggleTrait(id){
  const t=G.char.traits;
  if(t.includes(id))G.char.traits=t.filter(x=>x!==id);
  else if(t.length<3)G.char.traits=[...t,id];
  renderCreate();
}

/* ═══════════════════ GAME START ═══════════════════ */
function beginGame(){
  if(!G.char.name.trim())G.char.name="Сим";
  NPC.forEach(n=>{if(!G.rels[n.id])G.rels[n.id]=0});
  // Easter egg for Лиза
  const nm=G.char.name.toLowerCase().trim();
  if(nm==="лиза"||nm==="лизочка"||nm==="лизок"){
    G.money=2000;
    setTimeout(()=>notify("💕 Владик сделал эту игру для тебя, Лизочка!"),1200);
  }
  $('create').classList.add('hidden');$('game').classList.remove('hidden');
  startGameLoop();renderGame();
}
function loadAndStart(){
  try{
    const s=JSON.parse(localStorage.getItem("simlife_save"));
    if(s){Object.assign(G,s);NPC.forEach(n=>{if(!G.rels[n.id])G.rels[n.id]=0})}
  }catch(e){}
  $('title').classList.add('hidden');$('game').classList.remove('hidden');
  startGameLoop();renderGame();
}
function saveGame(){
  try{localStorage.setItem("simlife_save",JSON.stringify(G))}catch(e){}
}

/* ═══════════════════ GAME LOOP ═══════════════════ */
function startGameLoop(){
  clearInterval(tickIv);clearInterval(saveIv);
  tickIv=setInterval(()=>{
    if(paused||curAct)return;
    tick();renderGame();
  },3000/speed);
  saveIv=setInterval(saveGame,12000);
}
function tick(){
  G.hour++;
  if(G.hour>=24){G.hour=0;G.day++;if(G.career.s>0){G.money+=G.career.s;addLog(`💰 Зарплата: +${G.career.s}§`)}}
  // Decay
  const n=G.needs;
  n.hunger=Math.max(0,n.hunger-(1.6+Math.random()*.6));
  n.energy=Math.max(0,n.energy-(1+Math.random()*.4)*(hasTrait("active")?.7:1));
  n.fun=Math.max(0,n.fun-(.9+Math.random()*.5));
  n.hygiene=Math.max(0,n.hygiene-(.6+Math.random()*.3)*(hasTrait("neat")?.6:1));
  n.social=Math.max(0,n.social-(.7+Math.random()*.4)*(hasTrait("loner")?.5:1));
  n.bladder=Math.max(0,n.bladder-(1.4+Math.random()*.6));
  // Pet bonuses
  G.pets.forEach(p=>{if(p.id==="cat")n.fun=Math.min(100,n.fun+.8);if(p.id==="dog")n.social=Math.min(100,n.social+.8);if(p.id==="hamster")n.fun=Math.min(100,n.fun+.4);if(p.id==="parrot")n.social=Math.min(100,n.social+.4)});
  // Events
  if(Math.random()<(hasTrait("lucky")?.12:.07)){const e=EVENTS[Math.floor(Math.random()*EVENTS.length)];addLog(e.t);if(e.nd)n[e.nd]=Math.min(100,Math.max(0,n[e.nd]+e.am));if(e.money)G.money+=e.money}
  // Wishes
  const state={money:G.money,day:G.day,skills:G.skills,rels:G.rels,owned:G.owned,ad:G.ad,pets:G.pets,needs:G.needs,career:G.career};
  WISHES.forEach(w=>{if(!G.cw.includes(w.id)&&w.ck(state)){G.cw.push(w.id);G.money+=w.rw;G.xp+=25;notify(`✅ Цель: ${w.t} (+${w.rw}§)`);addLog(`⭐ ${w.t} — +${w.rw}§`)}});
}

/* ═══════════════════ ACTIONS ═══════════════════ */
function doAction(fid){
  if(curAct||paused)return;
  const f=allFurn().find(x=>x.id===fid);if(!f)return;
  curAct=f;actProg=0;
  const rm=RMS[f.rm];simX=(rm.x+rm.w/2)*100;simY=(rm.y+rm.h/2)*100;
  renderGame();
  const dur=f.t/speed,start=Date.now();
  progIv=setInterval(()=>{actProg=Math.min(100,(Date.now()-start)/dur*100);renderProgress()},80);
  actTo=setTimeout(()=>{
    clearInterval(progIv);
    let am=f.am;
    if(f.nd==="hunger"&&hasTrait("foodie"))am=Math.round(am*1.3);
    if(f.nd==="social"&&hasTrait("social"))am=Math.round(am*1.3);
    G.needs[f.nd]=Math.min(100,G.needs[f.nd]+am);
    addLog(`${f.i} ${f.act} — ${NL[f.nd]} +${am}`);G.xp+=5;
    if(f.sk){
      let sa=f.sa||5;if(f.sk==="creativity"&&hasTrait("creative"))sa=Math.round(sa*1.4);
      const old=G.skills[f.sk];G.skills[f.sk]=Math.min(100,old+sa);
      if(Math.floor(G.skills[f.sk]/10)>Math.floor(old/10)){const s=SKILLS.find(x=>x.id===f.sk);notify(`⬆️ ${s.i} ${s.n} — уровень ${Math.floor(G.skills[f.sk]/10)}!`)}
      G.ad[f.sk]=(G.ad[f.sk]||0)+1;
    }
    curAct=null;actProg=0;simX=50;simY=25;renderGame();
  },dur);
}
function cancelAct(){clearInterval(progIv);clearTimeout(actTo);curAct=null;actProg=0;simX=50;simY=25;renderGame()}

function renderProgress(){
  const el=document.getElementById('progFill');if(el)el.style.width=actProg+'%';
}

/* ═══════════════════ RENDER GAME ═══════════════════ */
function renderGame(){
  const night=isNight(),season=getSeason(),mood=getMood(),avg=avgN(),level=Math.floor(G.xp/100)+1;
  const sky=night?"linear-gradient(180deg,#1a1a3e,#2d2b55)":G.hour>=17?"linear-gradient(180deg,#ff9a56,#f5e6d3 30%)":`linear-gradient(180deg,${season.id==="spring"?"#e8f5e9,#c8e6c9":season.id==="summer"?"#fff8e1,#ffecb3":season.id==="autumn"?"#fff3e0,#ffe0b2":"#e3f2fd,#bbdefb"})`;
  $('game').style.background=sky;
  const fr=furnByRoom();

  let roomHTML="";
  for(const[key,rm] of Object.entries(RMS)){
    const items=fr[key]||[];
    const cols=Math.min(items.length||1,3),rows=Math.ceil((items.length||1)/cols);
    let furnHTML=items.map((f,fi)=>{
      const row=Math.floor(fi/cols),col=fi%cols,cw=100/cols,ch=100/rows;
      const fsz=Math.min(24,36/rows);
      return`<div class="furn-item" style="left:${col*cw+cw*.08}%;top:${row*ch+ch*.08+4}%;width:${cw*.84}%;height:${ch*.84-4}%;${curAct?'opacity:.5;cursor:not-allowed':''}" onclick="doAction('${f.id}')"><span style="font-size:${fsz}px">${f.i}</span><span style="font-size:${Math.min(8,10/rows*1.3)}px;font-weight:600;color:#666;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:90%">${f.n}</span></div>`;
    }).join('');
    const bg=night?mixColor(rm.c,"#1a1a3e",.4):rm.c;
    const flbg=night?mixColor(rm.f,"#1a1a3e",.3):rm.f;
    roomHTML+=`<div class="room-cell" style="left:${rm.x*100}%;top:${rm.y*100}%;width:${rm.w*100}%;height:${rm.h*100}%;background:${bg}"><div class="floor" style="background:${flbg}"></div><span class="label">${rm.l}</span>${furnHTML}</div>`;
  }

  const petsIcons=G.pets.map(p=>`<span style="animation:petBob 1s ease infinite">${p.i}</span>`).join('');
  const traitTags=G.char.traits.map(tid=>{const t=TRAITS.find(x=>x.id===tid);return`<span class="tag" style="background:rgba(255,255,255,.7);color:#666">${t.i}${t.n}</span>`}).join('');
  const warnTags=NEEDS.filter(n=>G.needs[n]<15).map(n=>`<span class="tag" style="background:rgba(255,68,68,.15);color:#ff4444;font-weight:700;animation:pulse 1s infinite">⚠️${NL[n]}!</span>`).join('');

  let tabContent="";
  if(tab==="needs")tabContent=NEEDS.map(n=>{const v=G.needs[n],c=v>60?NC[n]:v>30?"#ffaa44":"#ff4444";return`<div class="need-row"><span class="icon">${NI[n]}</span><span class="lbl">${NL[n]}</span><div class="bar"><div class="fill" style="width:${v}%;background:linear-gradient(90deg,${c},${c}cc);${v<25?`box-shadow:0 0 8px ${c}66`:''}"></div></div><span class="val" style="color:${v<25?'#ff4444':'#999'};font-weight:${v<25?700:400}">${Math.round(v)}</span></div>`}).join('');
  else if(tab==="skills")tabContent=SKILLS.map(sk=>{const v=G.skills[sk.id],lvl=Math.floor(v/10),pct=v%10*10;return`<div class="skill-row"><span style="font-size:13px;width:18px;text-align:center">${sk.i}</span><span style="font-size:10px;width:65px;color:#777;font-weight:600">${sk.n}</span><div class="bar"><div class="fill" style="width:${pct}%"></div></div><span style="font-size:10px;width:24px;text-align:right;font-weight:700;color:#3498DB">Lv${lvl}</span></div>`}).join('');
  else if(tab==="wishes")tabContent=WISHES.map(w=>{const done=G.cw.includes(w.id);return`<div style="display:flex;align-items:center;gap:5px;padding:3px 0;opacity:${done?1:.5}"><span style="font-size:13px">${done?"✅":w.i}</span><div style="flex:1;font-size:10px;font-weight:${done?700:500};color:${done?"#2ECC71":"#555"}">${w.t}</div><span style="font-size:9px;color:${done?"#2ECC71":"#F39C12"};font-weight:700">${done?"Готово!":`+${w.rw}§`}</span></div>`}).join('');
  else if(tab==="pets")tabContent=G.pets.length===0?`<div style="font-size:11px;color:#999;text-align:center;padding:10px">Нет питомцев 🐾<br><span style="font-size:9px">Заведи в магазине!</span></div>`:G.pets.map(p=>`<div style="padding:5px;border-radius:7px;background:rgba(0,0,0,.03);margin-bottom:4px"><div style="display:flex;align-items:center;gap:5px;margin-bottom:3px"><span style="font-size:20px;animation:petBob 1s ease infinite">${p.i}</span><div><div style="font-size:11px;font-weight:700">${p.n}</div><div style="font-size:9px;color:#888">Счастье: ${p.happiness||70}%</div></div></div><div style="display:flex;gap:3px;flex-wrap:wrap"><button style="padding:3px 7px;border-radius:7px;background:#E8F5E9;color:#2E7D32;font-size:9px;font-weight:600" onclick="petAct('${p.id}','feed')">🍖Кормить</button><button style="padding:3px 7px;border-radius:7px;background:#E8F5E9;color:#2E7D32;font-size:9px;font-weight:600" onclick="petAct('${p.id}','play')">🎾Играть</button><button style="padding:3px 7px;border-radius:7px;background:#E8F5E9;color:#2E7D32;font-size:9px;font-weight:600" onclick="petAct('${p.id}','pet')">🤲Погладить</button></div></div>`).join('');

  let progHTML="";
  if(curAct)progHTML=`<div class="progress-bar glass"><span style="font-size:16px">${curAct.i}</span><div style="flex:1"><div style="font-size:10px;font-weight:600;color:#333;margin-bottom:2px">${curAct.al}</div><div style="height:5px;background:#eee;border-radius:3px;overflow:hidden"><div id="progFill" style="width:${actProg}%;height:100%;background:linear-gradient(90deg,#2ECC71,#27AE60);border-radius:3px;transition:width .08s linear"></div></div></div><button style="padding:3px 9px;border-radius:12px;background:#ff6b6b;color:#fff;font-size:9px;font-weight:700" onclick="cancelAct()">✕</button></div>`;

  let quickHTML="";
  if(!curAct&&!paused)quickHTML=`<div class="quick-actions">${allFurn().map(f=>`<button class="quick-btn" onclick="doAction('${f.id}')"><span>${f.i}</span>${f.act}</button>`).join('')}</div>`;

  $('game').innerHTML=`
    <div class="topbar glass">
      <div style="display:flex;align-items:center;gap:8px">
        ${plumbobSVG(avg)}
        <span class="name">${G.char.name}</span>
        <span class="mood-tag" style="background:${mood.c}22;color:${mood.c}">${mood.e} ${mood.l}</span>
        <span style="font-size:9px;background:#3498DB22;color:#3498DB;padding:2px 7px;border-radius:8px;font-weight:700">Lv${level}</span>
      </div>
      <div class="info">
        <span>💰${G.money}§</span><span>📅${G.day}д</span>
        <span>${night?"🌙":"☀️"}${String(G.hour).padStart(2,'0')}:00</span>
        <span>${season.i}</span><span>${G.career.i}</span>${petsIcons}
      </div>
      <div style="display:flex;gap:3px;align-items:center">
        ${[1,2,3].map(s=>`<button class="speed-btn" style="border:2px solid ${speed===s?'#2ECC71':'#ddd'};background:${speed===s?'#2ECC71':'#fff'};color:${speed===s?'#fff':'#777'}" onclick="setSpeed(${s})">${s}x</button>`).join('')}
        <button class="speed-btn" style="border:2px solid ${paused?'#E74C3C':'#ddd'};background:${paused?'#E74C3C':'#fff'};color:${paused?'#fff':'#777'}" onclick="togglePause()">${paused?"▶":"⏸"}</button>
      </div>
    </div>
    <div class="tags">${traitTags}${warnTags}</div>
    <div class="main-layout">
      <div class="room-wrap">
        <div class="room">
          ${roomHTML}
          <div class="sim" style="left:${simX}%;top:${simY}%;transform:translate(-50%,-50%)">
            <div style="position:absolute;top:-16px;left:50%;transform:translateX(-50%)">${plumbobSVG(avg,10)}</div>
            ${charSVG(G.char,40,!!curAct)}
          </div>
          ${curAct?`<div class="bubble" style="left:${simX}%;top:calc(${simY}% - 50px);transform:translateX(-50%)">${curAct.al}</div>`:''}
          ${night?'<div class="night-overlay"></div>':''}
          <div class="secret-heart" onclick="notify('💕 для Лизочки от Владика')">💕</div>
        </div>
        ${progHTML}
        ${quickHTML}
      </div>
      <div class="side-panel">
        <div class="tab-row">
          ${[["needs","Нужды","❤️"],["skills","Навыки","📊"],["wishes","Цели","⭐"],["pets","Питомцы","🐾"]].map(([k,l,ic])=>`<button class="tab-btn ${tab===k?'active':''}" onclick="tab='${k}';renderGame()"><span style="font-size:12px">${ic}</span>${l}</button>`).join('')}
        </div>
        <div class="tab-content glass">${tabContent}</div>
        <div class="action-row">
          <button class="action-btn" style="background:linear-gradient(135deg,#F39C12,#E67E22)" onclick="openShop()">🛍️Магазин</button>
          <button class="action-btn" style="background:linear-gradient(135deg,#E91E63,#C2185B)" onclick="openSocial()">💬Люди</button>
          <button class="action-btn" style="background:linear-gradient(135deg,#3498DB,#2980B9)" onclick="openCareer()">💼Работа</button>
        </div>
        <div class="log-box glass">
          <div style="font-size:10px;font-weight:700;color:#333;margin-bottom:4px">📋 Журнал</div>
          ${G.log.map((l,i)=>`<div style="font-size:9px;color:#666;padding:2px 0;border-bottom:1px solid rgba(0,0,0,.03);opacity:${1-i*.02}">${l}</div>`).join('')}
        </div>
        <button class="save-btn" onclick="saveGame();notify('💾 Сохранено!')">💾 Сохранить</button>
      </div>
    </div>`;
}

function setSpeed(s){speed=s;clearInterval(tickIv);tickIv=setInterval(()=>{if(!paused&&!curAct){tick();renderGame()}},3000/speed)}
function togglePause(){paused=!paused;renderGame()}

function petAct(pid,act){
  G.pets=G.pets.map(p=>{if(p.id===pid)return{...p,happiness:Math.min(100,(p.happiness||70)+(act==='play'?20:act==='pet'?15:10))};return p});
  if(act==='play')G.needs.fun=Math.min(100,G.needs.fun+10);
  if(act==='pet')G.needs.social=Math.min(100,G.needs.social+8);
  const pet=G.pets.find(p=>p.id===pid);
  notify(`${pet.i} ${{feed:'Покормил!',play:'Поиграл!',pet:'Погладил!'}[act]}`);G.xp+=3;renderGame();
}

/* ═══════════════════ OVERLAYS ═══════════════════ */
function openOverlay(html){$('overlayContent').innerHTML=html+`<button class="close-btn" onclick="closeOverlay()">Закрыть</button>`;$('overlayEl').classList.remove('hidden')}
function closeOverlay(){$('overlayEl').classList.add('hidden')}

function openShop(){
  openOverlay(`
    <h3 style="margin:0 0 3px;font-size:18px;font-weight:800">🛍️ Магазин</h3>
    <p style="margin:0 0 8px;font-size:11px;color:#888">💰 ${G.money}§</p>
    <div style="font-size:12px;font-weight:700;margin-bottom:6px">Мебель и техника</div>
    <div class="shop-grid">${SHOP_F.map(it=>{const has=G.owned.includes(it.id),can=G.money>=it.cost;return`<div class="shop-card ${has?'owned':''}"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="font-size:20px">${it.i}</span><div><div style="font-size:11px;font-weight:700">${it.n}</div><div style="font-size:9px;color:#888">${NI[it.nd]}+${it.am}${it.sk?' | '+SKILLS.find(s=>s.id===it.sk).i:''}</div></div></div>${has?'<div style="font-size:10px;color:#2ECC71;font-weight:700;text-align:center">✅</div>':`<button style="width:100%;padding:5px 0;border-radius:7px;background:${can?'#F39C12':'#eee'};color:${can?'#fff':'#ccc'};font-size:11px;font-weight:700;cursor:${can?'pointer':'not-allowed'}" onclick="buyItem('${it.id}')">${it.cost}§</button>`}</div>`}).join('')}</div>
    <div style="font-size:12px;font-weight:700;margin:10px 0 6px">🐾 Питомцы</div>
    <div class="shop-grid">${PETS.map(p=>{const has=G.pets.find(x=>x.id===p.id),can=G.money>=p.cost;return`<div class="shop-card ${has?'owned':''}"><div style="text-align:center;margin-bottom:3px"><span style="font-size:26px">${p.i}</span></div><div style="font-size:11px;font-weight:700;text-align:center">${p.n}</div><div style="font-size:9px;color:#888;text-align:center;margin-bottom:4px">${p.d}</div>${has?'<div style="font-size:10px;color:#2ECC71;font-weight:700;text-align:center">✅ С тобой</div>':`<button style="width:100%;padding:5px 0;border-radius:7px;background:${can?'#E91E63':'#eee'};color:${can?'#fff':'#ccc'};font-size:11px;font-weight:700;cursor:${can?'pointer':'not-allowed'}" onclick="adoptPet('${p.id}')">${p.cost}§</button>`}</div>`}).join('')}</div>
  `);
}
function buyItem(id){
  const it=SHOP_F.find(x=>x.id===id);if(!it||G.money<it.cost||G.owned.includes(id))return;
  G.money-=it.cost;G.owned.push(id);addLog(`🛍️ ${it.i} ${it.n}`);notify(`🛍️ ${it.i} ${it.n}!`);G.xp+=10;openShop();renderGame();
}
function adoptPet(id){
  const p=PETS.find(x=>x.id===id);if(!p||G.money<p.cost||G.pets.find(x=>x.id===id))return;
  G.money-=p.cost;G.pets.push({...p,happiness:70});addLog(`🐾 ${p.i} ${p.n}!`);notify(`🐾 ${p.i} ${p.n} теперь с тобой!`);G.xp+=15;openShop();renderGame();
}

function openSocial(npcId){
  if(npcId){
    const npc=NPC.find(x=>x.id===npcId),rel=G.rels[npcId]||0,rl=getRL(rel);
    openOverlay(`
      <button style="background:none;border:none;font-size:11px;color:#888;cursor:pointer;margin-bottom:6px" onclick="openSocial()">← Назад</button>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span style="font-size:36px">${npc.i}</span>
        <div><div style="font-size:16px;font-weight:800">${npc.n}</div><span style="font-size:11px;color:${rl.c};font-weight:600">${rl.i} ${rl.t} — ${rel}%</span></div>
      </div>
      <div class="social-grid">${SOC.map(a=>{const canDo=!a.mr||rel>=a.mr,canAff=!a.cost||G.money>=a.cost,ok=canDo&&canAff;return`<button class="social-btn" style="background:${ok?(a.rom?'linear-gradient(135deg,#E91E63,#C2185B)':'linear-gradient(135deg,#3498DB,#2980B9)'):'#eee'};color:${ok?'#fff':'#ccc'};cursor:${ok?'pointer':'not-allowed'}" ${ok?`onclick="doSocial('${npcId}','${a.id}')"`:'disabled'}><div style="font-size:14px">${a.i}</div><div style="font-size:11px;font-weight:700">${a.n}</div><div style="font-size:8px;opacity:.8">❤️+${a.rel} 💬+${a.soc}${a.cost?' 💰'+a.cost+'§':''}</div>${!canDo?`<div style="font-size:7px;margin-top:1px">Нужно ${a.mr}%</div>`:''}</button>`}).join('')}</div>
    `);
  } else {
    openOverlay(`
      <h3 style="margin:0 0 12px;font-size:18px;font-weight:800">💬 Знакомые</h3>
      ${NPC.map(npc=>{const rel=G.rels[npc.id]||0,rl=getRL(rel);return`<div class="npc-row" onclick="openSocial('${npc.id}')"><span style="font-size:26px">${npc.i}</span><div style="flex:1"><div style="font-size:13px;font-weight:700">${npc.n} <span style="font-size:9px;color:#aaa;font-weight:400">${npc.tr}</span></div><div style="font-size:10px;color:${rl.c};font-weight:600">${rl.i} ${rl.t}</div></div><div style="width:50px"><div style="height:5px;background:#eee;border-radius:3px;overflow:hidden"><div style="width:${rel}%;height:100%;background:${rl.c};border-radius:3px"></div></div><div style="font-size:8px;text-align:center;color:#999;margin-top:1px">${rel}%</div></div></div>`}).join('')}
    `);
  }
}
function doSocial(npcId,actId){
  const a=SOC.find(x=>x.id===actId),npc=NPC.find(x=>x.id===npcId);if(!a)return;
  if(a.cost){if(G.money<a.cost)return;G.money-=a.cost}
  let rg=a.rel;if(hasTrait("social"))rg=Math.round(rg*1.2);if(hasTrait("romantic")&&a.rom)rg=Math.round(rg*1.5);
  G.rels[npcId]=Math.min(100,(G.rels[npcId]||0)+rg);G.needs.social=Math.min(100,G.needs.social+a.soc);
  addLog(`${a.i} ${a.n} с ${npc.n} — ❤️+${rg}`);notify(`${a.i} ${npc.i} ${npc.n}: ${a.n}!`);G.xp+=8;
  openSocial(npcId);renderGame();
}

function openCareer(){
  openOverlay(`
    <h3 style="margin:0 0 12px;font-size:18px;font-weight:800">💼 Карьера</h3>
    ${CAREERS.map(c=>{const act=G.career.id===c.id,can=canHire(c);return`<div class="career-row ${act?'active':''}"><span style="font-size:24px">${c.i}</span><div style="flex:1"><div style="font-size:13px;font-weight:700">${c.n}</div><div style="font-size:10px;color:#888">${c.s>0?c.s+'§/день':'—'}</div>${c.r?`<div style="font-size:9px;color:${can?'#2ECC71':'#E74C3C'}">${can?'✅':'🔒'} ${SKILLS.find(s=>s.id===c.r.sk).i} Lv${c.r.lv}</div>`:''}</div>${act?'<span style="font-size:10px;color:#2ECC71;font-weight:700">✅</span>':`<button style="padding:5px 12px;border-radius:7px;background:${can?'#2ECC71':'#eee'};color:${can?'#fff':'#ccc'};font-size:10px;font-weight:700;cursor:${can?'pointer':'not-allowed'}" ${can?`onclick="hireCar('${c.id}')"`:'disabled'}>Устроиться</button>`}</div>`}).join('')}
  `);
}
function hireCar(id){
  const c=CAREERS.find(x=>x.id===id);if(!c)return;G.career=c;addLog(`${c.i} Работа: ${c.n}!`);notify(`${c.i} ${c.n}!`);closeOverlay();renderGame();
}

/* Color mix helper (simple) */
function mixColor(c1,c2,amt){
  const h=s=>{const r=parseInt(s.slice(1),16);return[(r>>16)&255,(r>>8)&255,r&255]};
  const a=h(c1),b=h(c2);
  const m=a.map((v,i)=>Math.round(v*(1-amt)+b[i]*amt));
  return`#${m.map(v=>v.toString(16).padStart(2,'0')).join('')}`;
}

/* ═══ TELEGRAM IOS TAP FIX ═══
   On iPhone in Telegram WebView, touch events are unreliable on animated elements.
   Strategy: capture touchstart target, fire on touchend if no scroll occurred.
   We call the native onclick property directly - no new Function, no eval.
*/
(function(){
  var sx, sy, st;
  document.addEventListener('touchstart', function(e){
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    st = e.target;
  }, {passive:true});

  document.addEventListener('touchend', function(e){
    if(!st) return;
    var t = e.changedTouches[0];
    if(Math.abs(t.clientX-sx)>12 || Math.abs(t.clientY-sy)>12){ st=null; return; }
    var el = st; st = null;
    for(var i=0; i<12 && el && el.tagName!=='BODY'; i++){
      if(typeof el.onclick === 'function'){
        e.preventDefault();
        el.onclick(e);
        return;
      }
      // Also handle elements that have onclick as attribute string (set via innerHTML)
      var attr = el.getAttribute && el.getAttribute('onclick');
      if(attr){
        e.preventDefault();
        // Use Function constructor - CSP-safe since no external source
        try{ (new Function('event', attr))(e); }catch(err){}
        return;
      }
      el = el.parentElement;
    }
  }, {passive:false});
})();
